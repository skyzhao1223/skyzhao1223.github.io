<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — SKY ZHAO</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0e1015; color: #d4d7de;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; text-align: center; padding: 24px;
  }
  .wrap { max-width: 420px; }
  .code {
    font-size: clamp(80px, 20vw, 140px); font-weight: 800;
    letter-spacing: -0.04em; line-height: 1;
    background: linear-gradient(135deg, #7b8fcc 0%, #6e7486 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .msg { color: #6e7486; font-size: 16px; margin: 20px 0 32px; line-height: 1.6; }
  .back {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 24px; border-radius: 10px;
    font-size: 14px; font-weight: 600; text-decoration: none;
    background: rgba(123,143,204,0.12); color: #7b8fcc;
    border: 1px solid rgba(123,143,204,0.25);
    transition: background 0.2s, transform 0.15s;
  }
  .back:hover { background: rgba(123,143,204,0.25); transform: translateY(-1px); }
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <p class="msg">页面不存在，可能已经搬走了。</p>
  <a class="back" href="/">← 回到首页</a>
</div>
</body>
</html>
