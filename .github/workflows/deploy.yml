name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run prepare:pages

      - name: Commit static GitHub Pages files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html en .nojekyll 404.html avatar.png avatar.svg avatar.webp \
            baidu_verify_code-UbTTXiJc1F.html data.json data.en.json \
            qr-alipay.png qr-wechat-pay.png qr-wechat.png \
            robots.txt sitemap.xml pku_courses.html
          git diff --staged --quiet || git commit -m "chore: sync static GitHub Pages assets [skip ci]"
          git push

      - run: rm -rf docs && cp -r dist docs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
