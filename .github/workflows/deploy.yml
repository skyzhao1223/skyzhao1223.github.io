name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths-ignore:
      - 'avatar.png'
      - 'avatar.svg'
      - 'avatar.webp'
      - 'data.json'
      - 'data.en.json'
      - 'en/**'
      - 'qr-*.png'
      - 'robots.txt'
      - 'sitemap.xml'
      - 'pku_courses.html'
      - '404.html'
      - '.nojekyll'
      - 'baidu_verify_code-*.html'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run sync:public

      - name: Commit synced static assets for branch deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html en/ .nojekyll 404.html avatar.png avatar.svg avatar.webp \
            baidu_verify_code-UbTTXiJc1F.html data.json data.en.json \
            qr-alipay.png qr-wechat-pay.png qr-wechat.png \
            robots.txt sitemap.xml pku_courses.html
          git diff --staged --quiet || git commit -m "chore: sync public assets for GitHub Pages [skip ci]"
          git push

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
