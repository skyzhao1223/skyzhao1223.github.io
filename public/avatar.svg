<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="#1a1c24"/>

  <!-- Neck -->
  <rect x="165" y="280" width="70" height="40" rx="8" fill="#f0d5be"/>

  <!-- Shirt / Body -->
  <path d="M105 400 C105 340 140 310 200 310 C260 310 295 340 295 400Z" fill="#f0f0f0"/>
  <!-- Collar left -->
  <path d="M165 310 L185 340 L165 340Z" fill="#e0e0e0"/>
  <!-- Collar right -->
  <path d="M235 310 L215 340 L235 340Z" fill="#e0e0e0"/>
  <!-- Collar V-line -->
  <line x1="200" y1="310" x2="200" y2="350" stroke="#d8d8d8" stroke-width="1.5"/>
  <!-- Button -->
  <circle cx="200" cy="355" r="3" fill="#d0d0d0"/>
  <circle cx="200" cy="370" r="3" fill="#d0d0d0"/>

  <!-- Face -->
  <ellipse cx="200" cy="210" rx="82" ry="95" fill="#f5dcc3"/>

  <!-- Ears -->
  <ellipse cx="118" cy="215" rx="14" ry="20" fill="#f0d5be"/>
  <ellipse cx="282" cy="215" rx="14" ry="20" fill="#f0d5be"/>

  <!-- Hair back shadow -->
  <ellipse cx="200" cy="155" rx="90" ry="70" fill="#1c1c1e"/>

  <!-- Hair main shape -->
  <path d="M112 190 C112 130 150 95 200 90 C250 95 288 130 288 190 
           C288 175 270 145 250 138 
           C240 145 220 148 200 147 
           C180 148 155 142 145 135 
           C130 145 115 170 112 190Z" fill="#2a2a2e"/>

  <!-- Hair top volume -->
  <path d="M130 165 C135 120 160 100 200 95 C240 100 265 120 270 165
           C265 140 245 120 220 118
           C205 125 190 128 175 120
           C155 118 138 135 130 165Z" fill="#333338"/>

  <!-- Hair side-part highlight -->
  <path d="M155 130 C165 110 185 100 200 97 C190 105 175 115 165 130Z" fill="#3d3d42" opacity="0.6"/>

  <!-- Forehead highlight -->
  <ellipse cx="200" cy="165" rx="55" ry="15" fill="#f8e2cb" opacity="0.3"/>

  <!-- Eyebrows -->
  <path d="M152 192 C158 185 172 183 182 187" stroke="#3a3a3e" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M218 187 C228 183 242 185 248 192" stroke="#3a3a3e" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- Eyes -->
  <!-- Left eye -->
  <ellipse cx="167" cy="210" rx="16" ry="14" fill="white"/>
  <ellipse cx="169" cy="211" rx="9" ry="10" fill="#3a2518"/>
  <ellipse cx="171" cy="208" rx="3.5" ry="3.5" fill="white"/>
  <!-- Right eye -->
  <ellipse cx="233" cy="210" rx="16" ry="14" fill="white"/>
  <ellipse cx="231" cy="211" rx="9" ry="10" fill="#3a2518"/>
  <ellipse cx="233" cy="208" rx="3.5" ry="3.5" fill="white"/>

  <!-- Upper eyelids -->
  <path d="M151 205 C155 198 165 195 180 200" stroke="#3a3a3e" stroke-width="2" fill="none"/>
  <path d="M220 200 C235 195 245 198 249 205" stroke="#3a3a3e" stroke-width="2" fill="none"/>

  <!-- Nose -->
  <path d="M196 235 C196 228 200 225 204 228" stroke="#deb9a0" stroke-width="2" stroke-linecap="round" fill="none"/>
  <circle cx="194" cy="237" r="3" fill="#e8c4a8" opacity="0.5"/>
  <circle cx="207" cy="237" r="3" fill="#e8c4a8" opacity="0.5"/>

  <!-- Mouth - slight friendly smile -->
  <path d="M182 258 C190 268 210 268 218 258" stroke="#c9907a" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Cheek blush -->
  <ellipse cx="145" cy="240" rx="15" ry="8" fill="#f0b0a0" opacity="0.2"/>
  <ellipse cx="255" cy="240" rx="15" ry="8" fill="#f0b0a0" opacity="0.2"/>
</svg>
